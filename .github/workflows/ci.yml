name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fab
          POSTGRES_PASSWORD: fab
          POSTGRES_DB: fabgreat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fab -d fabgreat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fab:fab@localhost:5432/fabgreat
      DATABASE_SSL: "false"
      SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: cd apps/api && pip install -e ".[dev]"

      - name: Run migrations
        run: cd apps/api && alembic upgrade head

      - name: Run tests
        run: cd apps/api && pytest -v

  frontend:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd apps/web && npm ci

      - name: Build
        run: cd apps/web && npm run build

      - name: Lint
        run: cd apps/web && npm run lint

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fab
          POSTGRES_PASSWORD: fab
          POSTGRES_DB: fabgreat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fab -d fabgreat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fab:fab@localhost:5432/fabgreat
      DATABASE_SSL: "false"
      SECRET_KEY: ci-test-secret
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: cd apps/api && pip install -e ".[dev]"

      - name: Run migrations
        run: cd apps/api && alembic upgrade head

      - name: Import card data
        run: cd apps/api && python -m scripts.import_cards

      - name: Seed demo data
        run: cd apps/api && python -m scripts.seed

      - name: Start API server
        run: cd apps/api && uvicorn app.main:app --port 8000 &

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd apps/web && npm ci

      - name: Build frontend
        run: cd apps/web && npm run build

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd apps/web && npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
