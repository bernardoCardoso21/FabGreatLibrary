name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fab
          POSTGRES_PASSWORD: fab
          POSTGRES_DB: fabgreat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fab -d fabgreat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fab:fab@localhost:5432/fabgreat
      DATABASE_SSL: "false"
      SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: cd apps/api && pip install -e ".[dev]"

      - name: Run migrations
        run: cd apps/api && alembic upgrade head

      - name: Run tests
        run: cd apps/api && pytest -v

  frontend:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd apps/web && npm ci

      - name: Build
        run: cd apps/web && npm run build

      - name: Lint
        run: cd apps/web && npm run lint
